# ============================================================
#  BCF Dashboard — Configuration Template (PUBLIC)
#  Copy this file to config.public.yaml (org structure, layout, mappings —
#  safe to commit) and to config.yaml (local working copy the Admin Board
#  reads/writes). Passwords and tokens go in config.private.yaml instead —
#  see config.private.template.yaml. Never put secrets in this file.
#  Build via the Admin Board (python admin_server.py), or directly:
#    python build_dashboard.py --lean --output index.html
#    python build_data.py
#  See HANDOVER.md for the full config-hierarchy and build-flow rules.
# ============================================================

dashboard:
  title:    "BCF Coordination Dashboard"
  subtitle: "Plant Engineering — 3D Model Review"
  theme:    "dark"              # "dark" | "light"

snapshots:
  enabled:        true
  thumb_width:    480
  thumb_height:   270
  jpeg_quality:   82
  save_full_size: true          # saves originals to ./bcf_assets/

# Glob patterns for Revizto export files.
# Supported formats: .bcf (BCF 2.x/3.0), .xlsx (Revizto Excel), .vimmrk
bcf_sources:
  - "./exports/*.bcf"
  - "./exports/*.xlsx"
  - "./exports/*.vimmrk"

# Which issue field to use as the spatial/location value, in priority order
# (first non-empty field wins). Only relevant for XLSX sources.
spatial_field_priority:
  - room
  - space
  - zone
  - area
  - level
  - grid_location

# MS Project XML export — enables the Variance Gantt.
# Leave empty string "" to disable the Gantt.
msp_xml_path: "./exports/YOUR_PROJECT_PLAN.xml"

# Where build_dashboard.py writes the shell (~460KB with --lean). Keep this
# "index.html" for Azure Static Web Apps — it's the file Azure serves.
output_path: "index.html"

# Where build_data.py writes the encrypted data package.
data_output: "data.js"

# ── Discipline mapping ────────────────────────────────────────────
# Maps the first letter of a stamp code (e.g. H in H040) to a name.
discipline_map:
  A: "Architecture"
  E: "Electrical"
  H: "HVAC"
  I: "Instrumentation"
  P: "Process Engineering"
  Q: "BIM/3D Coordination"
  S: "Sanitary"
  Z: "Civil/Structural"

discipline_colors:
  A: "#aab6be"
  E: "#e09a2a"
  H: "#0081b1"
  I: "#9b59b6"
  P: "#e05c5c"
  Q: "#73b5e2"
  S: "#5ab87a"
  Z: "#c0925a"

# ── Build-time filters ────────────────────────────────────────────
# These filter issues BEFORE embedding — reduces dashboard size.
# Leave all lists empty to include everything.
filters:
  status:        []             # e.g. ["Open", "In progress"]
  type:          []
  priority:      []
  label_include: []             # only include issues with these labels
  label_exclude: []             # exclude issues with these labels

# ── Status and priority colours (used in charts and badges) ───────
colors:
  status:
    Open:        "#e05c5c"
    In Progress: "#e09a2a"
    In progress: "#e09a2a"
    Solved:      "#4fa3d4"
    Resolved:    "#4fa3d4"
    Closed:      "#5ab87a"
    Done:        "#5ab87a"
  priority:
    Critical:    "#e05c5c"
    High:        "#e07c2a"
    Medium:      "#e0c52a"
    Low:         "#7ec87e"
    Blocker:     "#e05c5c"
    Major:       "#e07c2a"
    Minor:       "#e0c52a"
    Trivial:     "#7ec87e"
    None:        "#888888"

# ── Dashboard layout ──────────────────────────────────────────────
layout:

  # KPI cards shown at the top of the Issue Dashboard tab.
  # Available: total_count, open_count, in_progress_count, resolved_count,
  #            closed_count, critical_count, overdue_count, avg_age_days
  kpi_row:
    - open_count
    - critical_count
    - overdue_count
    - avg_age_days

  # Charts rendered in the Analysis section.
  # type: "doughnut" | "bar" | "timeline"
  # field: any issue field — status, type, priority, assigned, discipline,
  #        spatial, level, created, stage, etc.
  charts:
    - { type: doughnut, field: status,     title: "By status",           col: 1 }
    - { type: bar,      field: type,       title: "By issue type",       col: 2 }
    - { type: bar,      field: priority,   title: "By priority",         col: 3 }
    - { type: bar,      field: assigned,   title: "By assignee",         col: 1 }
    - { type: bar,      field: discipline, title: "By discipline",       col: 2 }
    - { type: bar,      field: spatial,    title: "By location (Room/Zone)", col: 3 }
    - { type: bar,      field: level,      title: "By level/storey",     col: 1 }
    - { type: timeline, field: created,    title: "Issues over time",    col: 2 }

  # Issue register table
  table:
    columns:      [title, status, type, priority, assigned, due, age_days, level, spatial]
    default_sort: "due"
    sort_dir:     "asc"
    page_size:    20

# ── Stamp → WBS mapping for the Variance Gantt ───────────────────
# Maps Revizto stamp codes to MS Project task names (case-insensitive match).
# Use the WBS Mapping Tool in the dashboard to build this visually.
# Task names must match exactly what appears in your MS Project XML.
msp_task_map:
  # Architecture
  # A030: "Equipment Layout & 3D Model Setup"

  # Process Engineering
  # P040: "P&ID Revision 1 (All Disciplines)"

  # HVAC
  # H040: "HVAC Ductwork 3D Modelling"

  # BIM/3D Coordination
  # Q030: "Clash Resolution - All Disciplines"

# ── Git / Azure Deploy ────────────────────────────────────────────
# Enables automatic git push after a successful build from the admin UI.
# Requires: Git installed, repo initialized, origin remote configured.
git:
  auto_push: false   # set true to auto-push after build from the Admin Board

# ── Org structure — Department → Project → Subproject ─────────────
# Edit visually via the Admin Board's "Project Structure" tab instead of
# by hand where possible. build_dashboard.py falls back to the legacy flat
# `departments: {Name: [Project, ...]}` format if this key is absent.
organisation:
  departments:
    - id: your-dept-id
      name: "Your Department"
      projects:
        - id: your-project-id
          name: "Your Project"
          subprojects:
            - id: your-subproject-id
              name: "Your Subproject"
          # Absolute paths to source files belonging to this project —
          # written by the Admin Board when you drag-and-drop a source.
          sources: []

# Maps each source file (absolute path, must match a bcf_sources glob hit)
# to the dept/project it belongs to. Written by the Admin Board.
source_assignments: {}

# Reserved for future pattern-based auto-assignment of new source files to
# projects (e.g. by filename regex). Currently unused — leave empty.
source_patterns: []

# ── Document Management (optional) ─────────────────────────────────
# Set enabled: false or omit entirely if you don't track a document register.
doc_management:
  enabled: false
  master_register:
    path: "./exports/docregister/master_register.xlsx"
    sheet: "Master Register"
    columns:
      doc_number: "Document Number"
      title: "Document Title"
      discipline: "Discipline"
      asset_type: "Asset Type"
      required_status: "Required Status"
      required_date: "Required Date"
  asset_types: [Piping, Valves, Instruments, Equipment, Civil, Electrical, BIM]
  status_colors:
    Approved: "#5ab87a"
    Signed: "#4fa3d4"
    In Review: "#e09a2a"
    Missing: "#e05c5c"
    Rejected: "#c0392b"
  sources:
    # One entry per document source. source_type: "file" reads a local XLSX
    # export; source_type: "sharepoint_live" queries SharePoint directly —
    # its credentials (client_secret) go in config.private.yaml, never here.
    example_file_source:
      enabled: false
      label: "Example File Source"
      path: "./exports/docregister/example_export.xlsx"
      sheet: "Sheet1"
      columns:
        doc_number: "Document Number"
        title: "Description"
        discipline: "Discipline"
        status: "Status"
        revision: "Revision"
        date: "Date Modified"
        modified_by: "Modified By"
      status_map:
        Approved: Approved
        Signed: Signed
        In Review: In Review
        Missing: Missing
      source_type: file
