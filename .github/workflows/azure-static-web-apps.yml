name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard shell (lean)
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          LICENSE_JSON:       ${{ secrets.LICENSE_JSON }}
        run: |
          if [ -n "$DASHBOARD_PASSWORD" ]; then
            python build_dashboard.py --password "$DASHBOARD_PASSWORD" --lean
          else
            python build_dashboard.py --lean
          fi

      - name: Build data package
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          DATA_PASSWORD:      ${{ secrets.DATA_PASSWORD }}
          LICENSE_JSON:       ${{ secrets.LICENSE_JSON }}
        run: |
          _DATA_PW="${DATA_PASSWORD:-$DASHBOARD_PASSWORD}"
          if [ -n "$_DATA_PW" ]; then
            python build_data.py --password "$_DATA_PW"
          else
            python build_data.py --plain
          fi

      - name: Commit outputs (including data.js)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html
          git add -f data.js
          [ -f default.html ]             && git add default.html             || true
          [ -f config.public.yaml ]       && git add config.public.yaml       || true
          [ -f staticwebapp.config.json ] && git add staticwebapp.config.json || true

          git diff --staged --quiet && echo "Nothing to commit" && exit 0

          git commit -m "Rebuild dashboard [skip ci]"
          git stash --include-untracked || true
          git pull --rebase origin main  || true
          git stash pop                  || true
          git push origin main

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          skip_app_build: true
