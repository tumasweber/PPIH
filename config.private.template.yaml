# name-based: any doc_management source literally keyed "sharepoint" is
# treated as entirely private (not just its credentials) and goes here in
# full — label, path, columns, status_map AND the nested sharepoint: OAuth
# block. Don't rename it; don't duplicate it in config.public.yaml.
