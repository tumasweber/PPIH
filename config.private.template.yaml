# ============================================================
#  BCF Dashboard — Configuration Template (PRIVATE)
#  Copy this file to config.private.yaml. NEVER commit config.private.yaml —
#  it must stay in .gitignore. This template itself contains no real
#  secrets and is safe to track in git.
#
#  config.private.yaml holds passwords and tokens; everything else (org
#  structure, layout, mappings) belongs in config.public.yaml — see
#  config.template.yaml and HANDOVER.md rule #3.
# ============================================================

# Password required to open the Admin Board itself. Leave empty to disable
# the Admin Board login prompt (fine for a local-only dev machine).
admin_password: ""

# Encryption password for data.js (AES-256-GCM / PBKDF2-SHA256 200k) and,
# unless overridden, for the dashboard shell login too.
data_password: "CHANGE-ME"

# Azure Static Web Apps deployment token — only needed for the Admin
# Board's "Direct Azure Deploy" fallback (bypasses GitHub Actions).
# Azure Portal → your Static Web App → Manage deployment token.
azure_swa_token: ""

